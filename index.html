<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#3F5D42" />
    <meta
      name="description"
      content="A short and not-so-sweet text-based adventure. Explore, fight cute-but-hostile bunnies, and try to escape."
    />

    <!-- Favicons: .ico for legacy/tab-bar fallback, PNGs for modern
         browsers, apple-touch-icon for iOS home screen/bookmarks. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph: the "logo/preview" shown when a link is shared in
         iMessage, Slack, Discord, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://whenbunniesattack.netlify.app/" />
    <meta property="og:title" content="When Bunnies Attack" />
    <meta
      property="og:description"
      content="A short and not-so-sweet text-based adventure. Explore, fight cute-but-hostile bunnies, and try to escape."
    />
    <meta property="og:image" content="https://whenbunniesattack.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="When Bunnies Attack" />
    <meta
      name="twitter:description"
      content="A short and not-so-sweet text-based adventure. Explore, fight cute-but-hostile bunnies, and try to escape."
    />
    <meta name="twitter:image" content="https://whenbunniesattack.netlify.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="manifest" href="/manifest.json" />
